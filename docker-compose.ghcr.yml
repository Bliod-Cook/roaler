services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: roaler
      POSTGRES_USER: roaler
      POSTGRES_PASSWORD: roaler
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/bliod-cook/roaler-api:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - roaler-files:/var/lib/roaler/files

  worker:
    image: ghcr.io/bliod-cook/roaler-worker:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - roaler-files:/var/lib/roaler/files

  web:
    image: ghcr.io/bliod-cook/roaler-web:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  roaler-files:
